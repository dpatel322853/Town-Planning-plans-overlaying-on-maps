services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - CORS_ALLOW_ORIGINS=*
    volumes:
      - backend_work:/app/work

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_work:
